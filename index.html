<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV Vendée – Risque Chimique CMR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="assets/logo-restev.png" alt="RESTEV Vendée" class="logo">
    <h1>Accompagnement Risque Chimique CMR</h1>
</header>

<section class="intro">
    <p>Sélectionnez un métier pour afficher les risques principaux, les actions de prévention, et les ressources INRS associées.</p>
</section>

<section class="selector">
    <label for="metier">Choisissez un métier :</label>
    <select id="metier"></select>
</section>

<section class="card" id="result">
    <h2 id="title"></h2>

    <h3>Risques principaux</h3>
    <ul id="risques"></ul>

    <h3>Plan d’action</h3>
    <ul id="actions"></ul>

    <h3>Liens INRS / Commentaires</h3>
    <div id="liens"></div>
</section>

<script src="app.js"></script>
</body>
</html>
