<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyse CMR – RESTEV</title>

  <!-- Chargement du CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <img src="logo.png" class="logo" alt="Logo RESTEV">
  <h1>Analyse CMR</h1>
  <p class="subtitle">Outil RESTEV – Version complète</p>
</header>

<main>
  <div class="card">

    <label>Nom du produit :</label>
    <input id="produit" type="text" placeholder="Ex : Acétone">

    <label>Mentions H (CMR) :</label>
    <div class="grid">
      <button onclick="toggleH('H340')">H340</button>
      <button onclick="toggleH('H350')">H350</button>
      <button onclick="toggleH('H350i')">H350i</button>
      <button onclick="toggleH('H360')">H360</button>
      <button onclick="toggleH('H360F')">H360F</button>
      <button onclick="toggleH('H360D')">H360D</button>
    </div>

    <button class="analyse" onclick="analyze()">Analyser</button>
    <button class="reset" onclick="resetAnalyse()">Réinitialiser</button>

    <!-- ✅ SGH CMR -->
    <div id="sgh-cmr" class="sgh hidden">
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/f7/GHS-pictogram-health-hazard.svg" class="sgh-img">
    </div>
<!-- ✅ Bloc SGH (transparent + propre) -->
<div id="sgh" class="sgh hidden">

  <img id="sg-flamme" class="sgh-img hidden" 
       src="https://i.imgur.com/fp4dT8x.png" alt="Inflammable">

  <img id="sg-skull" class="sgh-img hidden" 
       src="https://i.imgur.com/kV8wH3s.png" alt="Toxicité aiguë">

  <img id="sg-corrosif" class="sgh-img hidden" 
       src="https://i.imgur.com/XjI6RHE.png" alt="Corrosif">

  <img id="sg-exclam" class="sgh-img hidden" 
       src="https://i.imgur.com/sv9lfe9.png" alt="Irritant">

  <img id="sg-sante" class="sgh-img hidden" 
       src="https://i.imgur.com/hyXqzAC.png" alt="Danger santé (CMR)">

  <img id="sg-explos" class="sgh-img hidden" 
       src="https://i.imgur.com/YoLrmeV.png" alt="Explosif">

  <img id="sg-env" class="sgh-img hidden" 
       src="https://i.imgur.com/tWm7A8k.png" alt="Environnement">
</div>
    <div id="result"></div>

  </div>
</main>

<!-- Chargement du JS -->
<script src="app.js"></script>

</body>
</html>
