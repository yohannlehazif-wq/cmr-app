<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyse CMR – RESTEV</title>

  <!-- Lien vers le fichier CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <img src="logo.png" class="logo" alt="Logo RESTEV">
    <h1 class="header-title">Analyse des produits CMR</h1>
    <p class="subtitle">RESTEV – Outil d’aide à la prévention</p>
  </header>

  <main>
    <div class="card fade-in">

      <label class="label">Nom du produit</label>
      <input id="produit" type="text" placeholder="Ex : Acétone">

      <label class="label">Mentions H détectées</label>
      <div class="h-grid">
        <button class="h-btn" onclick="toggleH('H340')">H340</button>
        <button class="h-btn" onclick="toggleH('H350')">H350</button>
        <button class="h-btn" onclick="toggleH('H350i')">H350i</button>
        <button class="h-btn" onclick="toggleH('H360')">H360</button>
        <button class="h-btn" onclick="toggleH('H360F')">H360F</button>
        <button class="h-btn" onclick="toggleH('H360D')">H360D</button>
      </div>

      <button class="btn-primary" onclick="analyze()">Analyser</button>
      <button class="btn-secondary" onclick="resetAnalyse()">Réinitialiser</button>

      <!-- PICTOGRAMMES SGH -->
      <div id="pictos" class="pictos-container hidden">
        <h4>Pictogrammes SGH :</h4>
        <div class="pictos-grid">
          <img id="sgm-flamme" class="picto hidden" src="https://upload.wikimedia.org/wikipedia/commons/9/9a/GHS-pictogram-flamme.svg">
          <img id="sgm-toxic" class="picto hidden" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/GHS-pictogram-skull.svg">
          <img id="sgm-corrosif" class="picto hidden" src="https://upload.wikimedia.org/wikipedia/commons/6/62/GHS-pictogram-acid.svg">
          <img id="sgm-point" class="picto hidden" src="https://upload.wikimedia.org/wikipedia/commons/3/3b/GHS-pictogram-exclam.svg">
          <img id="sgm-cmr" class="picto hidden" src="https://upload.wikimedia.org/wikipedia/commons/f/f7/GHS-pictogram-health-hazard.svg">
          <img id="sgm-explosif" class="picto hidden" src="https://upload.wikimedia.org/wikipedia/commons/8/8a/GHS-pictogram-explos.svg">
          <img id="sgm-environnement" class="picto hidden" src="https://upload.wikimedia.org/wikipedia/commons/e/e5/GHS-pictogram-pollu.svg">
        </div>
      </div>

      <!-- Résultat -->
      <div id="result"></div>

    </div>
  </main>

  <footer>
    <p>© RESTEV – Version Démo Professionnelle</p>
  </footer>

  <!-- Lien vers ton script JS -->
  <script src="app.js"></script>

</body>
</html>
