<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Analyse CMR – RESTEV</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>

<body>

    <header>
        <img src="logo.png" alt="Logo RESTEV" class="logo">
        <h1>Analyse CMR</h1>
        <h2>Prévention santé au travail</h2>
    </header>

    <main class="card">

        <label for="produit" class="label-title">Nom du produit :</label>
        <input type="text" id="produit" placeholder="Ex : Acétone, White Spirit…">

        <h3 class="label-title">Sélectionnez les mentions H :</h3>

        <div class="h-grid">
            <button class="h-btn" onclick="toggleH('H340')">H340</button>
            <button class="h-btn" onclick="toggleH('H350')">H350</button>
            <button class="h-btn" onclick="toggleH('H350i')">H350i</button>
            <button class="h-btn" onclick="toggleH('H360')">H360</button>
            <button class="h-btn" onclick="toggleH('H360F')">H360F</button>
            <button class="h-btn" onclick="toggleH('H360D')">H360D</button>
        </div>

        <button class="analyze-btn" onclick="analyze()">Analyser</button>

        <div id="result"></div>

    </main>

    <footer>
        RESTEV – Service prévention & santé au travail
    </footer>

</body>
</html>
